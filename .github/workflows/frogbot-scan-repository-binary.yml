name: "Frogbot Scan Repository (Binary)"
on:
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write
  security-events: write

jobs:
  scan-repository:
    runs-on: ubuntu-latest
    name: Scan Repository (main branch)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and run Frogbot V3
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.JF_GIT_TOKEN }}
          JF_GIT_BASE_BRANCH: main
          JF_GIT_REPO: ${{ github.event.repository.name }}
        run: |
          curl -fSL \
            -o frogbot \
            "https://releases.jfrog.io/artifactory/frogbot/v3/3.0.0/frogbot-linux-amd64/frogbot"
          chmod +x frogbot
          ./frogbot scan-repository
